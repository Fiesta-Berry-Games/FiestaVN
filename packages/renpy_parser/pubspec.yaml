name: renpy_parser
description: >-
  Parses Ren'Py .rpy script files into a typed Dart AST covering labels,
  dialogue, menus, screens, python blocks, and more.
version: 0.0.1
repository: https://git.cypherstack.com/FiestaBerry/fiestavn
homepage: https://git.cypherstack.com/FiestaBerry/fiestavn

topics:
  - renpy
  - visual-novel
  - parser

environment:
  sdk: ^3.7.2

dependencies:
  collection: ^1.18.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

examples:
  - example/renpy_parser_example.dart
