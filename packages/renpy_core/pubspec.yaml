name: renpy_core
description: >-
  Ren'Py script runner and Python-subset evaluator for Dart: executes parsed
  .rpy scripts via callbacks for dialogue, menus, images, and screen actions.
version: 0.0.3
repository: https://git.cypherstack.com/FiestaBerry/fiestavn
homepage: https://git.cypherstack.com/FiestaBerry/fiestavn

topics:
  - renpy
  - visual-novel
  - interpreter

environment:
  sdk: ^3.7.2

dependencies:
  path: ^1.8.0
  meta: ^1.8.0
  renpy_parser: ^0.0.2
  archive: ^4.0.9

dev_dependencies:
  test: ^1.21.0
  lints: ^2.0.0

examples:
  - example/renpy_core_example.dart
