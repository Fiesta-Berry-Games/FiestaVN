name: renpy_flutter
description: >-
  Flutter widgets and UI adapters for Ren'Py-compatible visual novels: dialogue,
  menus, image/audio layers, ATL animation, screen-language, and transitions.
version: 0.0.1
repository: https://git.cypherstack.com/FiestaBerry/fiestavn
topics:
  - visual-novel
  - renpy
  - game
  - flutter

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  renpy_core: ^0.0.3
  renpy_parser: ^0.0.2
  shared_preferences: ^2.5.5
  sound_dart: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
