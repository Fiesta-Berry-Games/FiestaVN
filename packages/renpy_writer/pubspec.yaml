name: renpy_writer
description: >-
  Ren'Py script emitter and .fly document codec for Dart: serializes parsed
  .rpy ASTs back to script text and to/from the strictly-typed JSON-based
  .fly story format.
version: 0.0.1
repository: https://git.cypherstack.com/FiestaBerry/fiestavn
homepage: https://git.cypherstack.com/FiestaBerry/fiestavn

topics:
  - renpy
  - visual-novel
  - serialization

environment:
  sdk: ^3.7.2

dependencies:
  archive: ^4.0.2
  renpy_parser: ^0.0.2

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
